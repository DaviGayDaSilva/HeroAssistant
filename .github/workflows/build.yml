name: Build HeroAssistant APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Compilar e Lançar Release
    runs-on: ubuntu-latest  # Única linha alterada

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'
          target: '34'

      - name: Criar gradle.properties
        run: |
          if [ ! -f gradle.properties ]; then
            echo "android.useAndroidX=true" > gradle.properties
            echo "android.enableJetifier=true" >> gradle.properties
            echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" >> gradle.properties
          fi

      - name: Dar permissão ao Gradle Wrapper
        run: chmod +x gradlew

      - name: Compilar APK Debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Verificar APK
        run: |
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "APK gerado com sucesso."
          else
            echo "APK não encontrado, verificando diretório:"
            find . -name "*.apk" -type f
            exit 1
          fi

      - name: Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: HeroAssistant-Debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Criar Release no GitHub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: HeroAssistant v1.0.${{ github.run_number }}
          body: |
            ## 🚀 HeroAssistant

            Build automático gerado pelo GitHub Actions.

            ### 📱 APK
            - **HeroAssistant-Debug**: versão de desenvolvimento

            ### ⚙️ Requisitos
            - Android 8.0 (API 26) ou superior
            - Shizuku instalado para recursos avançados
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
