name: Build HeroAssistant APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'
          target: '34'

      - name: Dar permissão ao Gradle Wrapper
        run: chmod +x gradlew

      - name: Compilar APK Debug
        run: ./gradlew assembleDebug

      - name: Compilar APK Release
        run: ./gradlew assembleRelease

      - name: Renomear APKs
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk HeroAssistant-debug.apk
          cp app/build/outputs/apk/release/app-release.apk HeroAssistant-release.apk

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: HeroAssistant-APKs
          path: |
            HeroAssistant-debug.apk
            HeroAssistant-release.apk

  release:
    name: Criar Release no GitHub
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Download dos APKs
        uses: actions/download-artifact@v4
        with:
          name: HeroAssistant-APKs

      - name: Criar Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: HeroAssistant v1.0.${{ github.run_number }}
          body: |
            ## HeroAssistant
            
            Build automático gerado pelo GitHub Actions.
            
            - **Debug**: versão de desenvolvimento
            - **Release**: versão de produção (não assinada)
            
            ### Requisitos
            - Android 8.0+
            - Shizuku (opcional, para recursos avançados)
          files: |
            HeroAssistant-debug.apk
            HeroAssistant-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
