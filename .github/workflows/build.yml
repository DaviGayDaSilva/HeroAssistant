name: Build HeroAssistant APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Compilar e Lançar Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'
          target: '34'

      - name: Dar permissão ao Gradle Wrapper
        run: chmod +x gradlew

      - name: Compilar APK Debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Verificar APK gerado
        run: |
          echo "=== Procurando APKs ==="
          find . -name "*.apk" -type f

      - name: Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: HeroAssistant-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
