name: Build HeroAssistant APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Compilar e Lançar Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'
          target: '34'

      - name: Dar permissão ao Gradle Wrapper
        run: chmod +x gradlew

      - name: Compilar APK Debug
        run: ./gradlew assembleDebug

      - name: Copiar APKs para raiz
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk HeroAssistant-debug.apk
          ls -la *.apk

      - name: Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: HeroAssistant-Debug
          path: HeroAssistant-debug.apk

      - name: Criar Release no GitHub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: HeroAssistant v1.0.${{ github.run_number }}
          body: |
            ## HeroAssistant

            Build automático gerado pelo GitHub Actions.

            ### Requisitos
            - Android 8.0 (API 26) ou superior
            - Shizuku instalado para recursos avançados
          files: HeroAssistant-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
